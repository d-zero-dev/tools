<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oocss Media Object</title>
</head>
<body>
  <div class="media bd">
    <div class="media-img">
      <img src="/img/user-1.jpg" class="obj" alt="User 1" />
    </div>
    <div class="media-body">
      <h4>Comment from User 1</h4>
      <p>This design pattern was introduced by Nicole Sullivan as part of OOCSS.</p>
      <div class="media bd">
        <div class="media-img">
          <img src="/img/user-2.jpg" class="obj" alt="User 2" />
        </div>
        <div class="media-body">
          <h4>Reply from User 2</h4>
          <p>Nested media objects work well for threaded comments.</p>
          <div class="media bd">
            <div class="media-img">
              <img src="/img/user-3.jpg" class="obj" alt="User 3" />
            </div>
            <div class="media-body">
              <h4>Reply from User 3</h4>
              <p>The object/skin separation keeps this component reusable everywhere.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <p id="marker-oocss-media-object" data-marker="oocss-media-object">MARKER_OOCSS_MEDIA_OBJECT</p>

</body>
</html>

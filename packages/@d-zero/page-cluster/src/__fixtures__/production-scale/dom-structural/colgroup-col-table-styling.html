<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colgroup/Col - Table Styling</title>
</head>
<body>
<main>
<p id="marker-colgroup-col-table-styling" data-marker="colgroup-col-table-styling">MARKER_COLGROUP_COL_TABLE_STYLING</p>
<table>
<caption>Inventory Overview</caption>
<colgroup>
<col class="col-name">
<col span="2" class="col-numeric">
<col class="col-status" style="background-color: #f5f5f5;">
</colgroup>
<thead>
<tr>
<th>Item</th>
<th>Quantity</th>
<th>Price</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td>Widget</td>
<td>120</td>
<td>4.50</td>
<td>In Stock</td>
</tr>
<tr>
<td>Gadget</td>
<td>0</td>
<td>12.00</td>
<td>Out of Stock</td>
</tr>
</tbody>
</table>
<table>
<colgroup span="4"></colgroup>
<tbody>
<tr>
<td>1</td>
<td>2</td>
<td>3</td>
<td>4</td>
</tr>
</tbody>
</table>
</main>
</body>
</html>

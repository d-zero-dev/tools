<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure/Figcaption Heavy</title>
</head>
<body>
<main>
<p id="marker-figure-figcaption-heavy" data-marker="figure-figcaption-heavy">MARKER_FIGURE_FIGCAPTION_HEAVY</p>
<figure>
<img src="/photos/mountain.jpg" alt="A mountain range at sunset">
<figcaption>A mountain range at sunset, taken in the Alps.</figcaption>
</figure>
<figure>
<figcaption>The quarterly results table:</figcaption>
<table>
<tbody>
<tr>
<td>Q1</td>
<td>120,000</td>
</tr>
<tr>
<td>Q2</td>
<td>134,000</td>
</tr>
</tbody>
</table>
</figure>
<figure>
<blockquote cite="https://example.com/quotes/1">
<p>The only way to do great work is to love what you do.</p>
</blockquote>
<figcaption>Steve Jobs, 2005</figcaption>
</figure>
<figure>
<img src="/photos/1.jpg" alt="Gallery photo 1">
<img src="/photos/2.jpg" alt="Gallery photo 2">
<img src="/photos/3.jpg" alt="Gallery photo 3">
<figcaption>A gallery of three photos from the trip.</figcaption>
</figure>
<figure>
<pre><code>function add(a, b) { return a + b; }</code></pre>
<figcaption>Example: a simple addition function.</figcaption>
</figure>
</main>
</body>
</html>

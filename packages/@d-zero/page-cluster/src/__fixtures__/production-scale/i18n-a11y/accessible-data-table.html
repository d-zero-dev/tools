<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accessible Data Table</title>
</head>
<body>
<header>
<h1>Quarterly Sales Report</h1>
</header>
<main>
<table>
<caption>Sales figures by region, Q1 2026</caption>
<thead>
<tr>
<th scope="col">Region</th>
<th scope="col">January</th>
<th scope="col">February</th>
<th scope="col">March</th>
</tr>
</thead>
<tbody>
<tr>
<th scope="row">North</th>
<td>$12,000</td>
<td>$14,500</td>
<td>$13,200</td>
</tr>
<tr>
<th scope="row">South</th>
<td>$9,800</td>
<td>$10,100</td>
<td>$11,000</td>
</tr>
<tr>
<th scope="row">East</th>
<td>$15,300</td>
<td>$16,000</td>
<td>$15,700</td>
</tr>
</tbody>
<tfoot>
<tr>
<th scope="row">Total</th>
<td>$37,100</td>
<td>$40,600</td>
<td>$39,900</td>
</tr>
</tfoot>
</table>
</main>
<footer>
<p id="marker-accessible-data-table" data-marker="accessible-data-table">MARKER_ACCESSIBLE_DATA_TABLE</p>
</footer>
</body>
</html>

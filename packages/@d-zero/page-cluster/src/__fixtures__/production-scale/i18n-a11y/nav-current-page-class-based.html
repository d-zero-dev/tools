<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation with Class-Based Current State</title>
</head>
<body>
<header>
<nav aria-label="Main">
<ul>
<li><a href="/" class="nav-item is-active">Home</a></li>
<li><a href="/about" class="nav-item">About</a></li>
<li><a href="/services" class="nav-item">Services</a></li>
<li><a href="/blog" class="nav-item">Blog</a></li>
<li><a href="/contact" class="nav-item">Contact</a></li>
</ul>
</nav>
</header>
<main>
<h1>Home</h1>
<p>This fixture demonstrates a navigation list where the current page is indicated by an extra CSS class (<code>is-active</code>) rather than an ARIA attribute, appended to exactly one of five sibling links.</p>
</main>
<footer>
<p id="marker-nav-current-page-class-based" data-marker="nav-current-page-class-based">MARKER_NAV_CURRENT_PAGE_CLASS_BASED</p>
</footer>
</body>
</html>

<div class="item-page">
<p>観葉植物を長く元気に育てるコツは、季節に応じて水やりの頻度を変えることです。一年中同じペースで水を与えていると、根腐れや水切れの原因になります。</p>
<p>春から夏にかけては生育期にあたるため、土の表面が乾いたらたっぷりと水を与えます。逆に冬場は休眠期に入るため、水やりの間隔を大きく空けるのが基本です。</p>

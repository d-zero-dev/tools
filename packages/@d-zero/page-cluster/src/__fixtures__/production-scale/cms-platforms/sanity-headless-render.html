<h1 class="PostPage_title__h1a3s">焙煎士が語る、浅煎りコーヒーの魅力</h1>
<img class="PostPage_heroImage__e5r7d" src="https://cdn.sanity.io/images/proj1234/production/light-roast-hero-1600x900.jpg" alt="焙煎中のコーヒー豆">
<div class="PortableText_root__d4m8x">
<p class="PortableText_block__a1b2c">浅煎りのコーヒーは、豆本来のフルーティーな酸味や花のような香りを楽しめるのが魅力です、と語るのは焙煎士の中村さん。</p>
<h2 class="PortableText_block__a1b2c">酸味は欠点ではない</h2>
<p class="PortableText_block__a1b2c">「酸っぱい」というと敬遠されがちですが、質の良い酸味はコーヒーの個性そのもの。産地ごとの違いを楽しんでほしいと中村さんは話します。</p>
<blockquote class="PortableText_blockquote__n6y2p">「浅煎りは豆の個性がそのまま出るので、生豆選びの時点で勝負が決まります」</blockquote>
</div>
</article>
